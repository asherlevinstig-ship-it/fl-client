<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administration</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .panel {
            background: white;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            font-size: 1.2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            padding: 10px 15px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #004c99; }
        .btn-warning { background: #e67e22; }
        .btn-warning:hover { background: #d35400; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #2ecc71; }
        
        .action-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #logArea {
            background: #222;
            color: #00ff00;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .warning-text {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Database Administration</h1>
    <p class="warning-text">⚠️ Note: Players must be offline for database changes to persist. If they are online, the server's auto-save will overwrite these edits.</p>

    <div class="panel">
        <h2>Authentication & Target</h2>
        <div class="form-group">
            <label for="apiUrl">Backend API URL</label>
            <input type="text" id="apiUrl" value="http://localhost:2567/api/admin/update-player">
        </div>
        <div class="form-group">
            <label for="adminToken">Admin Password</label>
            <input type="password" id="adminToken" placeholder="Enter security token">
        </div>
        <div class="form-group">
            <label for="targetPlayer">Target Player Name (Exact Database ID)</label>
            <input type="text" id="targetPlayer" placeholder="e.g., Student_Name">
        </div>
    </div>

    <div class="panel">
        <h2>Direct Database Actions</h2>
        
        <div class="action-row" style="margin-bottom: 20px;">
            <button id="giveLevelBtn">Grant 1 Level</button>
            <button id="resetSkillsBtn" class="btn-warning">Reset All Skills & Points</button>
        </div>

        <hr style="border: 1px solid #eee; margin: 20px 0;">

        <div class="action-row">
            <div class="form-group" style="flex: 2; margin-bottom: 0;">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="e.g., Iron Sword">
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
                <label for="itemAmount">Amount</label>
                <input type="number" id="itemAmount" value="1" min="1">
            </div>
            <button id="giveItemBtn" class="btn-success">Inject Item</button>
        </div>
    </div>

    <div id="logArea">System Ready...</div>

    <script>
        const logArea = document.getElementById('logArea');

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<br>[${time}] ${message}`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        async function sendAdminRequest(action, payload = {}) {
            const url = document.getElementById('apiUrl').value;
            const token = document.getElementById('adminToken').value;
            const playerName = document.getElementById('targetPlayer').value;

            if (!token) return log("❌ Error: Admin Password is required.");
            if (!playerName) return log("❌ Error: Target Player Name is required.");

            log(`📡 Sending request: ${action}...`);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminToken: token,
                        playerName: playerName,
                        action: action,
                        payload: payload
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    log(`✅ Success: ${data.message}`);
                } else {
                    log(`❌ Server Rejected: ${data.error}`);
                }
            } catch (err) {
                log(`❌ Network Error: Could not connect to API.`);
            }
        }

        document.getElementById('giveLevelBtn').addEventListener('click', () => {
            sendAdminRequest('give_level');
        });

        document.getElementById('resetSkillsBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to completely wipe this player's active abilities?")) {
                sendAdminRequest('reset_skills');
            }
        });

        document.getElementById('giveItemBtn').addEventListener('click', () => {
            const itemName = document.getElementById('itemName').value;
            const amount = document.getElementById('itemAmount').value;
            
            if (!itemName) return log("❌ Error: Item name is required.");
            
            sendAdminRequest('give_item', { itemName: itemName, amount: amount });
        });
    </script>

</body>
</html>
